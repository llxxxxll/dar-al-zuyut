<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>لا يوجد اتصال — دار الزيوت</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Tajawal", system-ui, -apple-system, sans-serif; background: #0A0A0C; color: #fff; }
  .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; text-align: center; }
  .card { max-width: 420px; background: rgba(255,255,255,.04); border: 1px solid rgba(212,175,55,.25); border-radius: 24px; padding: 36px 24px; backdrop-filter: blur(8px); }
  .drop { width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 18px; background: linear-gradient(135deg,#D4AF37,#F4D03F); display: grid; place-items: center; box-shadow: 0 10px 40px -10px rgba(212,175,55,.5); }
  h1 { font-size: 1.5rem; margin: 0 0 8px; }
  p { color: rgba(255,255,255,.7); line-height: 1.7; margin: 0 0 20px; }
  button { background: linear-gradient(135deg,#D4AF37,#F4D03F); color: #1a1a1a; border: 0; padding: 12px 28px; border-radius: 999px; font-weight: 800; font-size: 0.95rem; cursor: pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="drop">💧</div>
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>تعذّر تحميل الصفحة. تأكد من اتصالك ثم حاول مرة أخرى.</p>
      <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
  </div>
</body>
</html>
